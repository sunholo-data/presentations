<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Building AI with AI — Presenter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f1a;--surface:#1a1a2e;--orange:#e73c17;
  --orange-dim:rgba(231,60,23,.35);--green:#22c55e;
  --text:#e2e8f0;--text-dim:#718096;--ghost:rgba(255,255,255,.12);
  --bar-bg:rgba(15,15,26,.8);--bar-border:rgba(255,255,255,.06);
  --mono:'JetBrains Mono',monospace;--sans:'Montserrat',sans-serif;
}
[data-theme="light"]{
  --bg:#f5f5f0;--surface:#ffffff;--orange:#d4300f;
  --orange-dim:rgba(212,48,15,.2);--green:#16a34a;
  --text:#1a202c;--text-dim:#4a5568;--ghost:rgba(0,0,0,.1);
  --bar-bg:rgba(255,255,255,.85);--bar-border:rgba(0,0,0,.08);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans)}

#app{display:flex;flex-direction:column;height:100vh}

/* ─── Top bar ─── */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;
  border-bottom:1px solid var(--bar-border);
  flex-shrink:0;background:var(--bar-bg);
  backdrop-filter:blur(8px);z-index:10;
}
.top-left{display:flex;align-items:center;gap:10px}
.top-logo{height:20px;opacity:.7}
.presenter-title{font-size:12px;font-weight:600;color:var(--text-dim);letter-spacing:.02em}
.presenter-title .accent{color:var(--orange)}

/* ─── Deck tabs ─── */
.deck-tabs{display:flex;gap:4px;align-items:center}
.deck-tab{
  padding:5px 12px;border-radius:16px;
  font-size:11px;font-weight:600;letter-spacing:.02em;
  cursor:pointer;border:1px solid var(--ghost);
  background:transparent;color:var(--text-dim);
  transition:all .25s;font-family:var(--mono);
}
.deck-tab:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.deck-tab.active{background:var(--orange);border-color:var(--orange);color:#fff}
[data-theme="light"] .deck-tab{border-color:rgba(0,0,0,.1);color:var(--text-dim)}
[data-theme="light"] .deck-tab:hover{border-color:rgba(0,0,0,.25);color:var(--text)}
[data-theme="light"] .deck-tab.active{color:#fff}

.top-right{display:flex;align-items:center;gap:8px}
.theme-toggle{
  width:28px;height:28px;border-radius:50%;border:1px solid var(--ghost);
  background:transparent;color:var(--text-dim);cursor:pointer;
  font-size:12px;transition:all .25s;display:flex;align-items:center;justify-content:center;
}
.theme-toggle:hover{border-color:var(--orange);color:var(--orange)}

/* ─── Iframe viewport ─── */
.deck-viewport{flex:1;position:relative;overflow:hidden}
.deck-frame{
  position:absolute;inset:0;width:100%;height:100%;border:none;
  opacity:0;transition:opacity .4s ease;
  pointer-events:none;
}
.deck-frame.active{opacity:1;pointer-events:auto}
.deck-frame.loading{opacity:0}

/* ─── Bottom bar ─── */
.bottom-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 16px;
  border-top:1px solid var(--bar-border);
  flex-shrink:0;background:var(--bar-bg);
  backdrop-filter:blur(8px);
}
.nav-info{font-family:var(--mono);font-size:11px;color:var(--text-dim)}
.nav-info .current{color:var(--text);font-weight:700}
.nav-hints{display:flex;align-items:center;gap:6px}
.kbd{
  display:inline-block;padding:1px 5px;border-radius:3px;
  font-family:var(--mono);font-size:9px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:var(--text-dim);
}
[data-theme="light"] .kbd{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1)}
.hint-text{font-size:10px;color:var(--text-dim)}
</style>
</head>
<body>
<div id="app">

  <div class="top-bar">
    <div class="top-left">
      <img src="../images/logos/sunholo-logo.svg" alt="Sunholo" class="top-logo">
      <span class="presenter-title"><span class="accent">Building AI with AI</span> &mdash; Procurement Intelligence</span>
    </div>
    <div class="deck-tabs" id="deckTabs"></div>
    <div class="top-right">
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <i class="fas fa-sun"></i>
      </button>
    </div>
  </div>

  <div class="deck-viewport" id="viewport"></div>

  <div class="bottom-bar">
    <div class="nav-info">
      Deck <span class="current" id="deckNum">1</span> / <span id="deckTotal">1</span>
    </div>
    <div class="nav-hints">
      <span class="kbd">&larr;</span><span class="kbd">&rarr;</span>
      <span class="hint-text">slides</span>
      <span style="margin:0 6px;color:var(--ghost)">|</span>
      <span class="kbd">&uarr;</span><span class="kbd">&darr;</span>
      <span class="hint-text">decks</span>
    </div>
  </div>

</div>

<script>
(function(){

  // ═══════════════════════════════════════
  // PLAYLIST — Edit this to reorder/add/remove decks
  // ═══════════════════════════════════════
  const PLAYLIST = [
    { src: '00-building-ai-with-ai.html', label: 'AI + Procurement' },
    { src: '../contact-mark/contact-mark.html', label: 'Contact' },
  ];

  // ═══════════════════════════════════════

  let currentDeck = 0;
  let frames = [];
  const viewport = document.getElementById('viewport');
  const tabsContainer = document.getElementById('deckTabs');
  const deckNum = document.getElementById('deckNum');
  const deckTotal = document.getElementById('deckTotal');
  const themeToggle = document.getElementById('themeToggle');

  deckTotal.textContent = PLAYLIST.length;

  // Create iframes and tabs
  PLAYLIST.forEach((deck, i) => {
    const iframe = document.createElement('iframe');
    iframe.className = 'deck-frame' + (i === 0 ? ' active' : '');
    iframe.src = deck.src;
    iframe.setAttribute('allowfullscreen', '');
    viewport.appendChild(iframe);
    frames.push(iframe);

    const tab = document.createElement('button');
    tab.className = 'deck-tab' + (i === 0 ? ' active' : '');
    tab.textContent = deck.label;
    tab.addEventListener('click', () => switchDeck(i));
    tabsContainer.appendChild(tab);
  });

  function switchDeck(n, goToEnd) {
    if (n < 0 || n >= PLAYLIST.length) return;

    frames[currentDeck].classList.remove('active');
    currentDeck = n;

    const frame = frames[currentDeck];
    frame.classList.add('active');

    if (goToEnd) {
      frame.contentWindow.postMessage({ type: 'deck-command', action: 'go-last' }, '*');
    } else {
      frame.contentWindow.postMessage({ type: 'deck-command', action: 'go-first' }, '*');
    }

    deckNum.textContent = currentDeck + 1;
    document.querySelectorAll('.deck-tab').forEach((t, i) => {
      t.classList.toggle('active', i === currentDeck);
    });

    setTimeout(() => frame.contentWindow.focus(), 100);
  }

  // Listen for messages from deck iframes
  window.addEventListener('message', e => {
    if (e.data && e.data.type === 'deck-nav') {
      if (e.data.dir === 'next') switchDeck(currentDeck + 1, false);
      if (e.data.dir === 'prev') switchDeck(currentDeck - 1, true);
    }
    if (e.data && e.data.type === 'deck-theme') {
      setTheme(e.data.theme, false);
    }
  });

  // Up/Down arrows = deck-level navigation
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown') { e.preventDefault(); switchDeck(currentDeck + 1, false); }
    if (e.key === 'ArrowUp') { e.preventDefault(); switchDeck(currentDeck - 1, true); }
  });

  // Click on viewport focuses the iframe
  viewport.addEventListener('click', () => {
    const frame = frames[currentDeck];
    if (frame) frame.contentWindow.focus();
  });

  // Theme
  function setTheme(theme, broadcast) {
    document.documentElement.setAttribute('data-theme', theme);
    themeToggle.innerHTML = theme === 'light'
      ? '<i class="fas fa-moon"></i>'
      : '<i class="fas fa-sun"></i>';
    localStorage.setItem('presenter-theme', theme);

    if (broadcast !== false) {
      frames.forEach(f => {
        f.contentWindow.postMessage({ type: 'deck-command', action: 'set-theme', theme: theme }, '*');
      });
    }
  }

  themeToggle.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    setTheme(cur === 'light' ? 'dark' : 'light', true);
  });

  const saved = localStorage.getItem('presenter-theme');
  if (saved) setTheme(saved, true);

  // Focus first iframe on load
  frames[0].addEventListener('load', () => {
    frames[0].contentWindow.focus();
    if (saved) {
      frames[0].contentWindow.postMessage({ type: 'deck-command', action: 'set-theme', theme: saved }, '*');
    }
  });

  // Sync theme to iframes after they load
  frames.forEach(f => {
    f.addEventListener('load', () => {
      const theme = document.documentElement.getAttribute('data-theme') || 'dark';
      f.contentWindow.postMessage({ type: 'deck-command', action: 'set-theme', theme: theme }, '*');
    });
  });

})();
</script>
</body>
</html>
