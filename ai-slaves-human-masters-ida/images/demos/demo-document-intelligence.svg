    <animate attributeName="cy" values="74;84" dur="1.8s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.1" dur="1.8s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <!-- Extracted structured data boxes -->
  <rect x="152" y="8" width="88" height="24" rx="3" fill="rgba(66,133,244,0.08)" stroke="rgba(66,133,244,0.3)" stroke-width="1">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
