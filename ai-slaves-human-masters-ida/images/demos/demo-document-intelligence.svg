  <rect x="26" y="30" width="38" height="2.5" rx="1" fill="white" opacity="0.4"/>
  <rect x="26" y="38" width="46" height="2.5" rx="1" fill="white" opacity="0.35"/>
  <rect x="26" y="46" width="32" height="2.5" rx="1" fill="white" opacity="0.3"/>
