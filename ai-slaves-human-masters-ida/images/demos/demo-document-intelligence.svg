  <rect x="174" y="22" width="40" height="3" rx="1" fill="white" opacity="0.35"/>
  <rect x="152" y="40" width="88" height="24" rx="3" fill="rgba(66,133,244,0.08)" stroke="rgba(66,133,244,0.3)" stroke-width="1">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="158" y="46" width="20" height="3" rx="1" fill="#4285F4" opacity="0.7"/>
  <rect x="182" y="46" width="48" height="3" rx="1" fill="white" opacity="0.35"/>
  <rect x="158" y="54" width="14" height="3" rx="1" fill="#4285F4" opacity="0.7"/>
  <rect x="176" y="54" width="36" height="3" rx="1" fill="white" opacity="0.35"/>
  <rect x="152" y="72" width="88" height="24" rx="3" fill="rgba(66,133,244,0.08)" stroke="rgba(66,133,244,0.3)" stroke-width="1">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="1s" repeatCount="indefinite"/>
  </rect>
  <rect x="158" y="78" width="18" height="3" rx="1" fill="#4285F4" opacity="0.7"/>
  <rect x="180" y="78" width="50" height="3" rx="1" fill="white" opacity="0.35"/>
  <rect x="158" y="86" width="24" height="3" rx="1" fill="#4285F4" opacity="0.7"/>
  <rect x="186" y="86" width="30" height="3" rx="1" fill="white" opacity="0.35"/>
  <!-- Verification badge -->
  <circle cx="245" cy="108" r="8" fill="rgba(66,133,244,0.2)" stroke="rgba(66,133,244,0.5)" stroke-width="1">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <path d="M241 108l3 3 5-6" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
</svg>