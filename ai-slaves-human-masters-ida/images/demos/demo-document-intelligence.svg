<svg viewBox="0 0 260 120" width="260" height="120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="260" height="120" rx="6" fill="#1a1a2e"/>
  <!-- Document page -->
  <rect x="18" y="8" width="62" height="82" rx="3" fill="rgba(66,133,244,0.1)" stroke="rgba(66,133,244,0.35)" stroke-width="1"/>
  <rect x="18" y="8" width="62" height="14" rx="3" fill="rgba(66,133,244,0.2)"/>
