  </rect>
  <!-- Flow lines from doc to extracted data -->
  <line x1="88" y1="30" x2="148" y2="20" stroke="#4285F4" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.3">
    <animate attributeName="stroke-dashoffset" values="0;-7" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <line x1="88" y1="52" x2="148" y2="52" stroke="#4285F4" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.3">
    <animate attributeName="stroke-dashoffset" values="0;-7" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <line x1="88" y1="74" x2="148" y2="84" stroke="#4285F4" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.3">
    <animate attributeName="stroke-dashoffset" values="0;-7" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <!-- Flowing particles -->
  <circle r="2.5" fill="#4285F4">
    <animate attributeName="cx" values="88;148" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="30;20" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.15" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="white">
    <animate attributeName="cx" values="88;148" dur="1.6s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="52;52" dur="1.6s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1" dur="1.6s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="#4285F4">
