  <rect x="18" y="28" width="62" height="2" rx="1" fill="#4285F4" opacity="0.9">
    <animate attributeName="y" values="28;82;28" dur="2.5s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" keyTimes="0;0.5;1" repeatCount="indefinite"/>
  </rect>
  <rect x="18" y="28" width="62" height="10" rx="2" fill="#4285F4" opacity="0.08">
