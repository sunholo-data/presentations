<svg viewBox="0 0 260 120" width="260" height="120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="260" height="120" rx="6" fill="#1a1a2e"/>
  <!-- Code block on left -->
  <rect x="12" y="10" width="72" height="100" rx="4" fill="rgba(42,157,143,0.08)" stroke="rgba(42,157,143,0.25)" stroke-width="1"/>
  <!-- Code lines -->
  <rect x="20" y="20" width="10" height="2.5" rx="1" fill="#2a9d8f" opacity="0.6"/>
  <rect x="33" y="20" width="36" height="2.5" rx="1" fill="white" opacity="0.3"/>
  <rect x="24" y="28" width="14" height="2.5" rx="1" fill="white" opacity="0.25"/>
  <rect x="42" y="28" width="28" height="2.5" rx="1" fill="#2a9d8f" opacity="0.5"/>
  <rect x="24" y="36" width="22" height="2.5" rx="1" fill="white" opacity="0.2"/>
  <rect x="50" y="36" width="18" height="2.5" rx="1" fill="white" opacity="0.25"/>
  <rect x="20" y="44" width="8" height="2.5" rx="1" fill="#2a9d8f" opacity="0.6"/>
  <rect x="20" y="56" width="10" height="2.5" rx="1" fill="#2a9d8f" opacity="0.6"/>
  <rect x="33" y="56" width="40" height="2.5" rx="1" fill="white" opacity="0.3"/>
  <rect x="24" y="64" width="18" height="2.5" rx="1" fill="white" opacity="0.25"/>
  <rect x="46" y="64" width="24" height="2.5" rx="1" fill="#2a9d8f" opacity="0.5"/>
  <rect x="24" y="72" width="26" height="2.5" rx="1" fill="white" opacity="0.2"/>
  <rect x="20" y="80" width="8" height="2.5" rx="1" fill="#2a9d8f" opacity="0.6"/>
  <rect x="20" y="92" width="12" height="2.5" rx="1" fill="#2a9d8f" opacity="0.5"/>
  <rect x="36" y="92" width="30" height="2.5" rx="1" fill="white" opacity="0.25"/>
  <!-- Verification flow arrows from code to shield -->
  <line x1="92" y1="40" x2="138" y2="50" stroke="#2a9d8f" stroke-width="0.8" stroke-dasharray="5 3" opacity="0.3">
    <animate attributeName="stroke-dashoffset" values="0;-8" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="92" y1="60" x2="138" y2="60" stroke="#2a9d8f" stroke-width="0.8" stroke-dasharray="5 3" opacity="0.3">
    <animate attributeName="stroke-dashoffset" values="0;-8" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="92" y1="80" x2="138" y2="70" stroke="#2a9d8f" stroke-width="0.8" stroke-dasharray="5 3" opacity="0.3">
    <animate attributeName="stroke-dashoffset" values="0;-8" dur="1s" repeatCount="indefinite"/>
  </line>
  <!-- Verification particles -->
  <circle r="2" fill="#2a9d8f">
    <animate attributeName="cx" values="92;138" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="40;50" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="white">
    <animate attributeName="cx" values="92;138" dur="1.3s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="60;60" dur="1.3s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.08" dur="1.3s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#2a9d8f">
    <animate attributeName="cx" values="92;138" dur="1.7s" begin="0.9s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="80;70" dur="1.7s" begin="0.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1" dur="1.7s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <!-- Central shield -->
  <path d="M170 28l-26 10v16c0 18 10.5 34.5 26 38.5 15.5-4 26-20.5 26-38.5V38L170 28z" fill="rgba(42,157,143,0.1)" stroke="rgba(42,157,143,0.5)" stroke-width="1.5" stroke-linejoin="round">
    <animate attributeName="fill" values="rgba(42,157,143,0.1);rgba(42,157,143,0.2);rgba(42,157,143,0.1)" dur="3s" repeatCount="indefinite"/>
  </path>
  <!-- Shield inner glow -->
  <path d="M170 36l-18 7v12c0 13 7.5 25 18 28 10.5-3 18-15 18-28V43L170 36z" fill="rgba(42,157,143,0.08)" stroke="none"/>
  <!-- Bold checkmark -->
  <path d="M158 62l8 8 16-20" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </path>
  <!-- Proof tree on far right -->
  <line x1="210" y1="30" x2="210" y2="100" stroke="rgba(42,157,143,0.2)" stroke-width="1"/>
  <!-- Proof nodes -->
  <circle cx="230" cy="30" r="4" fill="rgba(42,157,143,0.15)" stroke="rgba(42,157,143,0.4)" stroke-width="1"/>
  <rect x="226" y="28" width="8" height="4" rx="1" fill="none" stroke="white" stroke-width="0.8" opacity="0.5"/>
  <line x1="210" y1="30" x2="226" y2="30" stroke="rgba(42,157,143,0.3)" stroke-width="0.8"/>
  <circle cx="240" cy="55" r="4" fill="rgba(42,157,143,0.15)" stroke="rgba(42,157,143,0.4)" stroke-width="1"/>
  <path d="M237 55l2 2 4-4" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="210" y1="55" x2="236" y2="55" stroke="rgba(42,157,143,0.3)" stroke-width="0.8"/>
  <circle cx="230" cy="80" r="4" fill="rgba(42,157,143,0.15)" stroke="rgba(42,157,143,0.4)" stroke-width="1"/>
  <path d="M227 80l2 2 4-4" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="210" y1="80" x2="226" y2="80" stroke="rgba(42,157,143,0.3)" stroke-width="0.8"/>
  <circle cx="245" cy="100" r="4" fill="rgba(42,157,143,0.15)" stroke="rgba(42,157,143,0.4)" stroke-width="1">
    <animate attributeName="fill" values="rgba(42,157,143,0.15);rgba(42,157,143,0.35);rgba(42,157,143,0.15)" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <path d="M242 100l2 2 4-4" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="210" y1="100" x2="241" y2="100" stroke="rgba(42,157,143,0.3)" stroke-width="0.8"/>
  <!-- Connecting proof tree lines -->
  <line x1="230" y1="34" x2="240" y2="51" stroke="rgba(42,157,143,0.2)" stroke-width="0.6"/>
  <line x1="240" y1="59" x2="230" y2="76" stroke="rgba(42,157,143,0.2)" stroke-width="0.6"/>
  <line x1="230" y1="84" x2="245" y2="96" stroke="rgba(42,157,143,0.2)" stroke-width="0.6"/>
</svg>