<svg viewBox="0 0 260 120" width="260" height="120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="260" height="120" rx="6" fill="#1a1a2e"/>
  <!-- Audio waveform bars - center -->
  <g transform="translate(130, 60)">
    <rect x="-60" y="-12" width="4" rx="2" fill="#e73c17" opacity="0.7">
      <animate attributeName="height" values="24;40;24" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-12;-20;-12" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="-52" y="-18" width="4" rx="2" fill="#e73c17" opacity="0.8">
      <animate attributeName="height" values="36;16;36" dur="1.0s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-18;-8;-18" dur="1.0s" repeatCount="indefinite"/>
    </rect>
    <rect x="-44" y="-22" width="4" rx="2" fill="white" opacity="0.6">
      <animate attributeName="height" values="44;28;44" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-22;-14;-22" dur="1.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="-36" y="-14" width="4" rx="2" fill="#e73c17" opacity="0.9">
      <animate attributeName="height" values="28;48;28" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-14;-24;-14" dur="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="-28" y="-8" width="4" rx="2" fill="white" opacity="0.5">
      <animate attributeName="height" values="16;36;16" dur="1.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-8;-18;-8" dur="1.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="-20" y="-20" width="4" rx="2" fill="#e73c17" opacity="0.8">
      <animate attributeName="height" values="40;20;40" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-20;-10;-20" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="-12" y="-26" width="4" rx="2" fill="white" opacity="0.7">
      <animate attributeName="height" values="52;30;52" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-26;-15;-26" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="-4" y="-30" width="4" rx="2" fill="#e73c17">
      <animate attributeName="height" values="60;24;60" dur="1.0s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-30;-12;-30" dur="1.0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.6;1" dur="1.0s" repeatCount="indefinite"/>
    </rect>
    <rect x="4" y="-26" width="4" rx="2" fill="white" opacity="0.7">
      <animate attributeName="height" values="52;34;52" dur="0.85s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-26;-17;-26" dur="0.85s" repeatCount="indefinite"/>
    </rect>
    <rect x="12" y="-20" width="4" rx="2" fill="#e73c17" opacity="0.8">
      <animate attributeName="height" values="40;18;40" dur="1.15s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-20;-9;-20" dur="1.15s" repeatCount="indefinite"/>
    </rect>
    <rect x="20" y="-10" width="4" rx="2" fill="white" opacity="0.5">
      <animate attributeName="height" values="20;38;20" dur="1.25s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-10;-19;-10" dur="1.25s" repeatCount="indefinite"/>
    </rect>
    <rect x="28" y="-16" width="4" rx="2" fill="#e73c17" opacity="0.9">
      <animate attributeName="height" values="32;46;32" dur="0.95s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-16;-23;-16" dur="0.95s" repeatCount="indefinite"/>
    </rect>
    <rect x="36" y="-22" width="4" rx="2" fill="white" opacity="0.6">
      <animate attributeName="height" values="44;24;44" dur="1.35s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-22;-12;-22" dur="1.35s" repeatCount="indefinite"/>
    </rect>
    <rect x="44" y="-18" width="4" rx="2" fill="#e73c17" opacity="0.7">
      <animate attributeName="height" values="36;14;36" dur="1.05s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-18;-7;-18" dur="1.05s" repeatCount="indefinite"/>
    </rect>
    <rect x="52" y="-12" width="4" rx="2" fill="white" opacity="0.4">
      <animate attributeName="height" values="24;38;24" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-12;-19;-12" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
  <!-- Expanding pulse rings -->
  <circle cx="130" cy="60" r="20" stroke="#e73c17" stroke-width="1" fill="none" opacity="0">
    <animate attributeName="r" values="20;65" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="60" r="20" stroke="#e73c17" stroke-width="1" fill="none" opacity="0">
    <animate attributeName="r" values="20;65" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="60" r="20" stroke="#e73c17" stroke-width="1" fill="none" opacity="0">
    <animate attributeName="r" values="20;65" dur="2.5s" begin="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0" dur="2.5s" begin="1.6s" repeatCount="indefinite"/>
  </circle>
  <!-- Streaming data indicators on left -->
  <circle cx="20" cy="40" r="3" fill="#e73c17" opacity="0.6">
    <animate attributeName="cx" values="20;60" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="20" cy="60" r="2" fill="white" opacity="0.4">
    <animate attributeName="cx" values="15;55" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.05" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="20" cy="80" r="2.5" fill="#e73c17" opacity="0.5">
    <animate attributeName="cx" values="25;65" dur="1.6s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.08" dur="1.6s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <!-- Streaming data indicators on right -->
  <circle cx="200" cy="35" r="2.5" fill="#e73c17" opacity="0.5">
    <animate attributeName="cx" values="200;245" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.05" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="60" r="3" fill="white" opacity="0.3">
    <animate attributeName="cx" values="195;240" dur="1.7s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.03" dur="1.7s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="85" r="2" fill="#e73c17" opacity="0.4">
    <animate attributeName="cx" values="205;248" dur="1.5s" begin="0.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.05" dur="1.5s" begin="0.7s" repeatCount="indefinite"/>
  </circle>
  <!-- Horizontal streaming lines -->
  <line x1="10" y1="48" x2="55" y2="48" stroke="#e73c17" stroke-width="0.6" stroke-dasharray="3 4" opacity="0.2">
    <animate attributeName="stroke-dashoffset" values="0;-7" dur="0.6s" repeatCount="indefinite"/>
  </line>
  <line x1="205" y1="72" x2="252" y2="72" stroke="#e73c17" stroke-width="0.6" stroke-dasharray="3 4" opacity="0.2">
    <animate attributeName="stroke-dashoffset" values="0;-7" dur="0.6s" repeatCount="indefinite"/>
  </line>
</svg>