<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Development Loop — Iterative AI Feedback Cycle</title>
<link rel="icon" type="image/svg+xml" href="/sunholo-logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* ─── Dark theme (default) ─── */
:root{
  --bg:#0f0f1a;
  --surface:#1a1a2e;
  --surface-hi:#222240;
  --orange:#e73c17;
  --orange-dim:rgba(231,60,23,.35);
  --orange-glow:rgba(231,60,23,.6);
  --green:#22c55e;
  --green-dim:rgba(34,197,94,.15);
  --green-glow:rgba(34,197,94,.4);
  --red:#ef4444;
  --red-dim:rgba(239,68,68,.12);
  --amber:#f59e0b;
  --amber-dim:rgba(245,158,11,.15);
  --indigo:#818cf8;
  --indigo-solid:#6366f1;
  --indigo-dim:rgba(129,140,248,.15);
  --indigo-glow:rgba(129,140,248,.4);
  --gray:#4a5568;
  --ghost:rgba(255,255,255,.12);
  --text:#e2e8f0;
  --text-dim:#718096;
  --text-xdim:#4a5568;
  --code-bg:rgba(255,255,255,.03);
  --code-border:rgba(255,255,255,.06);
  --bar-bg:rgba(15,15,26,.8);
  --bar-border:rgba(255,255,255,.06);
  --mono:'JetBrains Mono',monospace;
  --sans:'Montserrat',sans-serif;

  --orbit-track:rgba(255,255,255,.06);
  --orbit-lit:rgba(231,60,23,.5);
  --orbit-glow:rgba(231,60,23,.15);
  --node-bg:#1a1a2e;
  --node-border:rgba(255,255,255,.1);
  --node-border-dim:rgba(255,255,255,.04);
  --node-shadow:rgba(0,0,0,.4);
  --detail-bg:rgba(26,26,46,.6);
  --detail-border:rgba(255,255,255,.06);
  --particle:#e73c17;
  --particle-glow:rgba(231,60,23,.6);
  --check-color:rgba(34,197,94,.7);
}

/* ─── Light theme ─── */
[data-theme="light"]{
  --bg:#f5f5f0;
  --surface:#ffffff;
  --surface-hi:#f0f0ea;
  --orange:#d4300f;
  --orange-dim:rgba(212,48,15,.2);
  --orange-glow:rgba(212,48,15,.4);
  --green:#16a34a;
  --green-dim:rgba(22,163,74,.1);
  --green-glow:rgba(22,163,74,.3);
  --red:#dc2626;
  --red-dim:rgba(220,38,38,.08);
  --amber:#d97706;
  --amber-dim:rgba(217,119,6,.1);
  --indigo:#6366f1;
  --indigo-solid:#4f46e5;
  --indigo-dim:rgba(99,102,241,.1);
  --indigo-glow:rgba(99,102,241,.3);
  --gray:#8896a4;
  --ghost:rgba(0,0,0,.1);
  --text:#1a202c;
  --text-dim:#4a5568;
  --text-xdim:#94a3b8;
  --code-bg:rgba(0,0,0,.03);
  --code-border:rgba(0,0,0,.08);
  --bar-bg:rgba(255,255,255,.85);
  --bar-border:rgba(0,0,0,.08);

  --orbit-track:rgba(0,0,0,.06);
  --orbit-lit:rgba(212,48,15,.45);
  --orbit-glow:rgba(212,48,15,.1);
  --node-bg:#ffffff;
  --node-border:rgba(0,0,0,.1);
  --node-border-dim:rgba(0,0,0,.04);
  --node-shadow:rgba(0,0,0,.06);
  --detail-bg:rgba(255,255,255,.7);
  --detail-border:rgba(0,0,0,.06);
  --particle:#d4300f;
  --particle-glow:rgba(212,48,15,.5);
  --check-color:rgba(22,163,74,.6);
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans)}

body{
  background-image:
    radial-gradient(circle at 30% 50%, rgba(231,60,23,.025) 0%, transparent 60%),
    linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
  background-size: 100% 100%, 60px 60px, 60px 60px;
}
[data-theme="light"] body{
  background-image:
    radial-gradient(circle at 30% 50%, rgba(212,48,15,.025) 0%, transparent 60%),
    linear-gradient(rgba(0,0,0,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,.04) 1px, transparent 1px);
  background-size: 100% 100%, 60px 60px, 60px 60px;
}

#app{display:flex;flex-direction:column;height:100vh}

/* ─── Slide canvas: 16:9 letterbox stage ─── */
.slides-viewport{
  flex:1; min-height:0;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; background:var(--bg);
  container-type:size;
}
.slides-stage{
  position:relative;
  width:  min(100cqi, 100cqb * 16 / 9);
  height: min(100cqb, 100cqi * 9 / 16);
  container-type:size;
}
/* Hide own bars when embedded in presenter — presenter supplies global chrome */
.in-iframe .top-bar{display:none}
.in-iframe .bottom-bar{display:none}
.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  padding:0;
  opacity:0;visibility:hidden;
  transform:translateX(40px);
  transition:opacity .45s ease, transform .45s ease, visibility 0s .45s;
}
.slide.active{
  opacity:1;visibility:visible;
  transform:translateX(0);
  transition:opacity .45s ease, transform .45s ease, visibility 0s;
}
.slide.exit-left{transform:translateX(-40px)}

/* ─── Bottom bar ─── */
.bottom-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;
  border-top:1px solid var(--bar-border);
  flex-shrink:0;background:var(--bar-bg);backdrop-filter:blur(8px);
}
.transport{display:flex;align-items:center;gap:8px}
.transport-btn{
  width:36px;height:36px;border-radius:50%;border:1px solid var(--ghost);
  background:transparent;color:var(--text-dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:all .2s;font-family:var(--sans);
}
.transport-btn:hover{border-color:var(--orange);color:var(--orange)}
.transport-btn:disabled{opacity:.3;cursor:default}
.step-indicator{font-family:var(--mono);font-size:13px;color:var(--text-dim)}
.step-indicator .current{color:var(--text);font-weight:700}
.nav-hints{display:flex;align-items:center;gap:8px}
.kbd{
  display:inline-block;padding:1px 6px;border-radius:3px;
  font-family:var(--mono);font-size:10px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--text-dim);
}
[data-theme="light"] .kbd{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1)}
.slide-dots{display:flex;gap:6px;align-items:center}
.slide-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--ghost);border:none;cursor:pointer;transition:all .25s;padding:0;
}
.slide-dot.active{background:var(--orange);box-shadow:0 0 8px var(--orange-dim)}

/* ═══════════════════════════════════════════════
   DEVELOPMENT LOOP SLIDE
   ═══════════════════════════════════════════════ */

/* ─── Tilted-orbit stage ─── */
.loop-stage{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 40px 28px;
  gap:24px;
}
.loop-header{text-align:center}
.loop-header h1{
  font-size:clamp(24px,3.2cqi,38px);
  font-weight:800;letter-spacing:-.02em;line-height:1.1;
}
.loop-header h1 .accent{color:var(--orange)}
.loop-header .sub{
  font-family:var(--mono);font-size:11px;color:var(--text-dim);
  letter-spacing:.06em;text-transform:uppercase;margin-top:6px;
}

/* Orbit container — wide & short to look "edge-on" */
.orbit{
  position:relative;
  width:min(880px,100%);
  aspect-ratio: 2.2 / 1;
  margin:0 auto;
}
.orbit-svg{
  position:absolute;inset:0;
  width:100%;height:100%;
  overflow:visible;
  pointer-events:none;
}
.orbit-path{
  fill:none;
  stroke:var(--ghost);
  stroke-width:1.5;
  stroke-dasharray:5 7;
}
[data-theme="light"] .orbit-path{stroke:rgba(0,0,0,.18)}
.orbit-flow{
  fill:none;
  stroke:var(--orange-dim);
  stroke-width:2;
  stroke-linecap:round;
  stroke-dasharray:6 16;
  opacity:.85;
  animation:flowDrift 5s linear infinite;
}
@keyframes flowDrift{
  to{stroke-dashoffset:-220}
}

/* Spotlight under the "front" of the orbit */
.spot{
  position:absolute;
  left:50%;bottom:-12%;
  width:64%;height:42%;
  background:radial-gradient(ellipse at center,
    rgba(231,60,23,.22) 0%,
    rgba(231,60,23,.05) 45%,
    transparent 80%);
  transform:translateX(-50%);
  filter:blur(2px);
  pointer-events:none;
  z-index:0;
}

/* Each node sits absolutely on the ellipse */
.orbit-node{
  position:absolute;
  transform:translate(-50%,-50%) scale(var(--s,1));
  transform-origin:center;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;
  transition:
    left .85s cubic-bezier(.5,.05,.2,1),
    top  .85s cubic-bezier(.5,.05,.2,1),
    transform .85s cubic-bezier(.5,.05,.2,1),
    opacity .85s ease,
    filter .85s ease;
}
.orbit-node .puck{
  width:62px;height:62px;border-radius:50%;
  background:var(--surface);
  border:1.5px solid var(--ghost);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;color:var(--text-dim);
  box-shadow:0 6px 18px rgba(0,0,0,.32);
  transition:background .45s, border-color .45s, color .45s, box-shadow .45s;
}
[data-theme="light"] .orbit-node .puck{box-shadow:0 4px 14px rgba(0,0,0,.08)}
.orbit-node .lab{
  font-family:var(--mono);font-size:10px;
  letter-spacing:.05em;text-transform:uppercase;
  color:var(--text-dim);text-align:center;
  white-space:nowrap;
  transition:color .45s, font-weight .45s;
}
/* Active node — front, bright, large */
.orbit-node.is-active .puck{
  background:var(--orange);
  border-color:var(--orange);
  color:#fff;
  box-shadow:
    0 0 0 6px rgba(231,60,23,.18),
    0 16px 36px rgba(231,60,23,.45);
}
.orbit-node.is-active .lab{
  color:var(--text);font-weight:700;
}

/* Centered visual block — sits inside the orbit's middle */
.orbit-center{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:48%;
  display:flex;flex-direction:column;
  align-items:center;gap:12px;
  text-align:center;
  z-index:5;
  pointer-events:none;
}
.stage-visual{
  width:100%;
  aspect-ratio: 184 / 64;
  background:linear-gradient(180deg, rgba(231,60,23,.08), rgba(231,60,23,.03));
  border:1px solid var(--orange-dim);
  border-radius:12px;
  overflow:hidden;
  position:relative;
  box-shadow:
    0 14px 36px rgba(0,0,0,.4),
    0 2px 6px rgba(0,0,0,.2),
    inset 0 0 0 1px rgba(255,255,255,.02);
}
[data-theme="light"] .stage-visual{
  box-shadow:0 10px 28px rgba(0,0,0,.1), 0 1px 3px rgba(0,0,0,.05);
}
.stage-visual .viz{
  width:100%;height:100%;display:block;
}
.orbit-copy{max-width:100%;padding:0 8px}
.orbit-copy .name{
  font-size:clamp(16px,1.9cqi,22px);
  font-weight:800;color:var(--text);
  letter-spacing:-.015em;line-height:1.15;
}

/* Caption strip below the orbit — one short line of "what this means" */
.loop-caption{
  width:min(680px,100%);
  text-align:center;
  font-size:clamp(12px,1.3cqi,14.5px);
  line-height:1.5;
  color:var(--text-dim);
  padding:4px 16px;
}
.loop-caption strong{color:var(--text);font-weight:600}

/* ─── Per-stage SVG visuals — animations replay each swap ─── */
.viz text{font-family:var(--mono);font-size:7.5px;fill:var(--text);font-weight:600}
.viz .v-mute{fill:var(--text-dim);font-weight:500}

/* Stage 1 — Design Doc */
.v-doc .v-paper{fill:var(--surface);stroke:var(--ghost);stroke-width:1.2}
.v-doc .v-titlebar{fill:var(--orange);opacity:.8}
.v-doc .v-ln{stroke:var(--text-dim);stroke-width:1.4;stroke-linecap:round;
  transform-origin:left center;transform:scaleX(0);transform-box:fill-box}
.v-doc .v-l1{animation:vDocLn .35s ease .15s forwards}
.v-doc .v-l2{animation:vDocLn .35s ease .28s forwards}
.v-doc .v-l3{animation:vDocLn .35s ease .41s forwards}
.v-doc .v-l4{animation:vDocLn .35s ease .54s forwards}
@keyframes vDocLn{to{transform:scaleX(1)}}
.v-doc .v-stamp{transform-origin:center center;transform-box:fill-box;
  opacity:0;transform:scale(.4) rotate(-18deg);
  animation:vDocStamp .4s cubic-bezier(.4,1.6,.5,1) .8s forwards}
.v-doc .v-stamp circle{fill:none;stroke:var(--orange);stroke-width:1.8}
.v-doc .v-stamp path{fill:none;stroke:var(--orange);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.v-doc .v-stamp text{fill:var(--orange);font-size:6px;letter-spacing:.06em}
@keyframes vDocStamp{to{opacity:1;transform:scale(1) rotate(-6deg)}}

/* Stage 2 — Multi-Model Review (opacity-only entry to keep SVG transforms intact) */
.v-review .v-chip rect{fill:var(--surface);stroke:var(--ghost);stroke-width:1}
.v-review .v-chip text{fill:var(--text);font-size:7px;dominant-baseline:middle}
.v-review .v-chip{opacity:0}
.v-review .v-c1{animation:vFadeIn .35s ease .1s forwards}
.v-review .v-c2{animation:vFadeIn .35s ease .25s forwards}
.v-review .v-c3{animation:vFadeIn .35s ease .4s forwards}
.v-review .v-ok circle{fill:rgba(34,197,94,.18);stroke:var(--green);stroke-width:1.2}
.v-review .v-ok path{fill:none;stroke:var(--green);stroke-width:1.5;stroke-linecap:round}
.v-review .v-warn circle{fill:rgba(239,68,68,.15);stroke:#ef4444;stroke-width:1.2}
.v-review .v-warn path{fill:none;stroke:#ef4444;stroke-width:1.5;stroke-linecap:round}
.v-review .v-tag text{fill:var(--text-dim)}
.v-review .v-tag .strong{fill:var(--orange);font-weight:700}

/* Stage 3 — Sprint Plan */
.v-sprint .v-card rect{fill:var(--surface);stroke:var(--ghost);stroke-width:1}
.v-sprint .v-card .v-cb{fill:var(--orange);stroke:none;opacity:.85}
.v-sprint .v-card .v-cl{stroke:var(--text-dim);stroke-width:1.2;stroke-linecap:round}
.v-sprint .v-card{opacity:0}
.v-sprint .v-card1{animation:vFadeIn .3s ease .08s forwards}
.v-sprint .v-card2{animation:vFadeIn .3s ease .18s forwards}
.v-sprint .v-card3{animation:vFadeIn .3s ease .28s forwards}
.v-sprint .v-card4{animation:vFadeIn .3s ease .38s forwards}
.v-sprint .v-card5{animation:vFadeIn .3s ease .48s forwards}

/* Stage 4 — AI Execution (terminal-style) */
.v-build text{font-size:8px;fill:var(--text);font-weight:500}
.v-build .v-prompt{fill:var(--orange);font-weight:700}
.v-build .v-row{opacity:0}
.v-build .v-r1{animation:vFadeIn .3s ease .1s forwards}
.v-build .v-r2{animation:vFadeIn .3s ease .25s forwards}
.v-build .v-r3{animation:vFadeIn .3s ease .4s forwards}
.v-build .v-ok circle{fill:rgba(34,197,94,.2);stroke:var(--green);stroke-width:1.2}
.v-build .v-ok path{fill:none;stroke:var(--green);stroke-width:1.5;stroke-linecap:round}
.v-build .v-pulse circle{fill:var(--orange);animation:vPulse 1.2s ease-in-out infinite}
@keyframes vPulse{0%,100%{opacity:.4}50%{opacity:1}}

/* Shared opacity-only entry */
@keyframes vFadeIn{to{opacity:1}}

/* Stage 5 — M-EVAL bars */
.v-eval .v-bar{opacity:.9;transform-origin:bottom;transform:scaleY(0);
  transform-box:fill-box}
.v-eval .v-pass{fill:var(--green)}
.v-eval .v-fail{fill:#ef4444}
.v-eval .v-axis{stroke:var(--ghost);stroke-width:1}
.v-eval .v-tag{fill:var(--text);font-size:8px}
.v-eval .v-tag .pass-n{fill:var(--green);font-weight:700}
.v-eval .v-b1{animation:vBar .35s ease .08s forwards}
.v-eval .v-b2{animation:vBar .35s ease .14s forwards}
.v-eval .v-b3{animation:vBar .35s ease .20s forwards}
.v-eval .v-b4{animation:vBar .35s ease .26s forwards}
.v-eval .v-b5{animation:vBar .35s ease .32s forwards}
.v-eval .v-b6{animation:vBar .35s ease .38s forwards}
.v-eval .v-b7{animation:vBar .35s ease .44s forwards}
.v-eval .v-b8{animation:vBar .35s ease .50s forwards}
.v-eval .v-b9{animation:vBar .35s ease .56s forwards}
.v-eval .v-b10{animation:vBar .35s ease .62s forwards}
@keyframes vBar{to{transform:scaleY(1)}}

/* Stage 6 — Iterate */
.v-iterate .v-fail-doc rect{fill:var(--surface);stroke:rgba(239,68,68,.55);stroke-width:1.2}
.v-iterate .v-new-doc rect{fill:var(--surface);stroke:var(--orange-dim);stroke-width:1.2}
.v-iterate .v-fail-doc line,
.v-iterate .v-new-doc line{stroke:var(--text-dim);stroke-width:1.2;stroke-linecap:round}
.v-iterate .v-x{fill:rgba(239,68,68,.15);stroke:#ef4444;stroke-width:1.5}
.v-iterate .v-x-mark{fill:none;stroke:#ef4444;stroke-width:1.5;stroke-linecap:round}
.v-iterate .v-arrow{
  fill:none;stroke:var(--orange);stroke-width:1.8;
  stroke-dasharray:80;stroke-dashoffset:80;
  animation:vArrowDraw .45s ease .35s forwards;
}
.v-iterate .v-arrowhead{fill:var(--orange);opacity:0;
  animation:vArrowHead .25s ease .8s forwards}
@keyframes vArrowDraw{to{stroke-dashoffset:0}}
@keyframes vArrowHead{to{opacity:1}}
.v-iterate .v-spin-fa{
  width:14px;height:14px;
  display:flex;align-items:center;justify-content:center;
  color:var(--orange);font-size:11px;
  animation:vSpin 2.5s linear infinite;
  transform-origin:center;
}
@keyframes vSpin{to{transform:rotate(360deg)}}
.v-iterate .v-tag{fill:var(--text-dim);font-size:7px;letter-spacing:.05em}
.v-iterate .v-new-doc{opacity:0;animation:vNewDoc .35s ease 1s forwards}
@keyframes vNewDoc{to{opacity:1}}
/* ─── Play button ─── */
.play-btn{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--ghost);background:transparent;
  color:var(--text-dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;transition:all .2s;
}
.play-btn:hover{border-color:var(--orange);color:var(--orange)}
.play-btn.playing{border-color:var(--orange);color:var(--orange)}

</style>
</head>
<body>
<script>if(window!==window.top)document.body.classList.add('in-iframe');</script>
<div id="app">

  <div class="slides-viewport">
    <div class="slides-stage">
    <div class="slide active" data-title="The Development Loop">
      <div class="loop-stage">

        <div class="loop-header">
          <h1>The Development <span class="accent">Loop</span></h1>
          <div class="sub">Six stages &middot; the brief loops back &middot; nothing runs without it</div>
        </div>

        <div class="orbit" id="orbit">
          <svg class="orbit-svg" viewBox="0 0 840 350" preserveAspectRatio="none">
            <ellipse class="orbit-path" cx="420" cy="175" rx="378" ry="98"/>
            <ellipse class="orbit-flow" cx="420" cy="175" rx="378" ry="98"/>
          </svg>
          <div class="spot"></div>

          <!-- Centered visual + label — lives inside the orbit's middle -->
          <div class="orbit-center">
            <div class="stage-visual" id="stageVisual"></div>
            <div class="orbit-copy">
              <div class="name" id="detailName">Design Doc</div>
            </div>
          </div>

          <!-- 6 orbital nodes injected by JS -->
        </div>

        <!-- One-line caption beneath the orbit -->
        <div class="loop-caption" id="detailWhat">A human writes the brief. Nothing else runs until it's approved.</div>

      </div>
    </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="transport">
      <button class="transport-btn" id="btnPrev" title="Previous step"><i class="fas fa-chevron-left"></i></button>
      <button class="play-btn" id="btnPlay" title="Auto-play"><i class="fas fa-play"></i></button>
      <button class="transport-btn" id="btnNext" title="Next step"><i class="fas fa-chevron-right"></i></button>
      <span class="step-indicator" style="margin-left:8px">
        Step <span class="current" id="stepNum">0</span> / <span id="stepTotal">6</span>
      </span>
    </div>
    <div class="slide-dots" id="dots"></div>
    <div class="nav-hints">
      <span class="kbd">&larr;</span><span class="kbd">&rarr;</span>
      <span style="font-size:11px;color:var(--text-dim);margin-left:4px">steps</span>
      <span style="margin:0 8px;color:var(--ghost)">|</span>
      <span class="kbd">&uarr;</span><span class="kbd">&darr;</span>
      <span style="font-size:11px;color:var(--text-dim);margin-left:4px">decks</span>
    </div>
  </div>

</div>

<script>
(function(){

  /* ═══════════════════════════════
     NODE DATA — short captions only
     ═══════════════════════════════ */
  const NODES = [
    { name: 'Design Doc',         badge: 'HUMAN',     icon: 'fa-pencil',
      what: "A human writes the brief. Nothing else runs until it's approved." },
    { name: 'Multi-Model Review', badge: 'AI · 3×',   icon: 'fa-comments',
      what: "Three models read the brief. Disagreement is the signal." },
    { name: 'Sprint Plan',        badge: 'PLAN',      icon: 'fa-list-check',
      what: "AI breaks the brief into day-sized tasks with explicit blockers." },
    { name: 'AI Execution',       badge: 'AI BUILDS', icon: 'fa-microchip',
      what: "The agent writes the code. Every change typechecks before the next." },
    { name: 'M-EVAL Benchmarks',  badge: 'EVALUATE',  icon: 'fa-chart-column',
      what: "Each task runs in the harness. Tokens, time, pass/fail recorded." },
    { name: 'New Design Docs',    badge: 'ITERATE',   icon: 'fa-rotate',
      what: "Failures auto-generate a new brief. The loop closes." },
  ];
  const N = NODES.length;
  let step = 0;
  let playing = false;
  let playTimer = null;

  /* ═══════════════════════════════
     PER-STAGE MINI-ILLUSTRATIONS
     Returned as SVG strings. Re-inserted on each step so CSS animations replay.
     ═══════════════════════════════ */
  const VIZ = {
    // 1. Design Doc — paper with text lines drawing in + approved stamp
    designdoc: `<svg viewBox="0 0 184 64" preserveAspectRatio="xMidYMid meet" class="viz v-doc">
      <rect class="v-paper" x="10" y="6" width="100" height="52" rx="4"/>
      <rect class="v-titlebar" x="18" y="13" width="48" height="3" rx="1.5"/>
      <line class="v-ln v-l1" x1="18" y1="24" x2="92" y2="24"/>
      <line class="v-ln v-l2" x1="18" y1="32" x2="102" y2="32"/>
      <line class="v-ln v-l3" x1="18" y1="40" x2="80" y2="40"/>
      <line class="v-ln v-l4" x1="18" y1="48" x2="98" y2="48"/>
      <g class="v-stamp">
        <circle cx="150" cy="32" r="16"/>
        <path d="M141 32 L147 38 L159 25"/>
        <text x="150" y="55" text-anchor="middle">APPROVED</text>
      </g>
    </svg>`,

    // 2. Multi-Model Review — 3 model chips with verdicts (2 agree, 1 dissents)
    review: `<svg viewBox="0 0 184 64" preserveAspectRatio="xMidYMid meet" class="viz v-review">
      <g class="v-chip v-c1" transform="translate(8,8)">
        <rect width="78" height="13" rx="6.5"/>
        <text x="22" y="6.5">Claude</text>
        <g class="v-mark v-ok" transform="translate(70,6.5)"><circle r="5.5"/><path d="M-2.4 0 L-0.8 1.6 L2.4 -1.8"/></g>
      </g>
      <g class="v-chip v-c2" transform="translate(8,25)">
        <rect width="78" height="13" rx="6.5"/>
        <text x="22" y="6.5">Gemini</text>
        <g class="v-mark v-ok" transform="translate(70,6.5)"><circle r="5.5"/><path d="M-2.4 0 L-0.8 1.6 L2.4 -1.8"/></g>
      </g>
      <g class="v-chip v-c3" transform="translate(8,42)">
        <rect width="78" height="13" rx="6.5"/>
        <text x="22" y="6.5">GPT</text>
        <g class="v-mark v-warn" transform="translate(70,6.5)"><circle r="5.5"/><path d="M-2.2 -2.2 L2.2 2.2 M2.2 -2.2 L-2.2 2.2"/></g>
      </g>
      <g class="v-tag" transform="translate(98,22)">
        <text x="0" y="0" class="strong">2 / 3 agree</text>
        <text x="0" y="14">disagreement</text>
        <text x="0" y="23">= signal</text>
      </g>
    </svg>`,

    // 3. Sprint Plan — 5 small task cards in a row
    sprint: `<svg viewBox="0 0 184 64" preserveAspectRatio="xMidYMid meet" class="viz v-sprint">
      ${[0,1,2,3,4].map(i => `
        <g class="v-card v-card${i+1}" transform="translate(${10+i*34},8)">
          <rect width="28" height="48" rx="3"/>
          <rect class="v-cb" y="0" width="28" height="4" rx="2"/>
          <line class="v-cl" x1="5" y1="14" x2="22" y2="14"/>
          <line class="v-cl" x1="5" y1="22" x2="22" y2="22"/>
          <line class="v-cl" x1="5" y1="30" x2="14" y2="30"/>
        </g>
      `).join('')}
    </svg>`,

    // 4. AI Execution — terminal-style command lines with green checks
    build: `<svg viewBox="0 0 184 64" preserveAspectRatio="xMidYMid meet" class="viz v-build">
      <g class="v-row v-r1" transform="translate(10,14)">
        <text x="0" y="3" class="v-prompt">›</text>
        <text x="9" y="3">ailang check</text>
        <g class="v-ok" transform="translate(160,0)"><circle r="5.5"/><path d="M-2.4 0 L-0.8 1.6 L2.4 -1.8"/></g>
      </g>
      <g class="v-row v-r2" transform="translate(10,30)">
        <text x="0" y="3" class="v-prompt">›</text>
        <text x="9" y="3">ailang test</text>
        <g class="v-ok" transform="translate(160,0)"><circle r="5.5"/><path d="M-2.4 0 L-0.8 1.6 L2.4 -1.8"/></g>
      </g>
      <g class="v-row v-r3" transform="translate(10,46)">
        <text x="0" y="3" class="v-prompt">›</text>
        <text x="9" y="3">git commit</text>
        <g class="v-pulse" transform="translate(160,0)"><circle r="3.5"/></g>
      </g>
    </svg>`,

    // 5. M-EVAL Benchmarks — bar chart (10 tasks, 2 fail)
    eval: `<svg viewBox="0 0 184 64" preserveAspectRatio="xMidYMid meet" class="viz v-eval">
      ${(function(){
        const heights = [36,40,28,42,38,24,34,32,40,38];
        const fails = [5,8]; // task indexes that fail
        return heights.map((h,i) => `<rect class="v-bar v-b${i+1} ${fails.includes(i)?'v-fail':'v-pass'}" x="${10+i*16}" y="${54-h}" width="10" height="${h}" rx="1.2"/>`).join('');
      })()}
      <line class="v-axis" x1="4" y1="56" x2="180" y2="56"/>
      <text x="178" y="12" text-anchor="end" class="v-tag"><tspan class="pass-n">8</tspan> / 10 pass</text>
    </svg>`,

    // 6. Iterate — failed doc → arrow → new doc with refresh icon
    iterate: `<svg viewBox="0 0 184 64" preserveAspectRatio="xMidYMid meet" class="viz v-iterate">
      <g class="v-fail-doc" transform="translate(8,8)">
        <rect width="38" height="48" rx="3"/>
        <line x1="6" y1="12" x2="32" y2="12"/>
        <line x1="6" y1="20" x2="30" y2="20"/>
        <line x1="6" y1="28" x2="26" y2="28"/>
        <circle class="v-x" cx="19" cy="40" r="6"/>
        <path class="v-x-mark" d="M16 37 L22 43 M22 37 L16 43"/>
      </g>
      <path class="v-arrow" d="M54 32 L122 32"/>
      <polygon class="v-arrowhead" points="116 28 124 32 116 36"/>
      <text x="88" y="24" text-anchor="middle" class="v-tag">regenerate</text>
      <g class="v-new-doc" transform="translate(130,8)">
        <rect width="38" height="48" rx="3"/>
        <line x1="6" y1="12" x2="32" y2="12"/>
        <line x1="6" y1="20" x2="30" y2="20"/>
        <line x1="6" y1="28" x2="26" y2="28"/>
        <line x1="6" y1="36" x2="32" y2="36"/>
        <foreignObject x="12" y="38" width="14" height="14">
          <div xmlns="http://www.w3.org/1999/xhtml" class="v-spin-fa">
            <i class="fas fa-rotate"></i>
          </div>
        </foreignObject>
      </g>
    </svg>`,
  };
  // Map stage index → viz key
  const VIZ_KEYS = ['designdoc','review','sprint','build','eval','iterate'];

  /* ═══════════════════════════════
     DOM REFS
     ═══════════════════════════════ */
  const orbit       = document.getElementById('orbit');
  const stageVisual = document.getElementById('stageVisual');
  const detailName  = document.getElementById('detailName');
  const detailWhat  = document.getElementById('detailWhat');
  const stepNumEl   = document.getElementById('stepNum');
  const btnPrev     = document.getElementById('btnPrev');
  const btnNext     = document.getElementById('btnNext');
  const btnPlay     = document.getElementById('btnPlay');
  const dotsWrap    = document.getElementById('dots');

  /* ═══════════════════════════════
     BUILD ORBIT NODES
     ═══════════════════════════════ */
  const nodeEls = [];
  for (let i = 0; i < N; i++){
    const n = NODES[i];
    const el = document.createElement('div');
    el.className = 'orbit-node';
    el.innerHTML =
      '<span class="puck"><i class="fas ' + n.icon + '"></i></span>' +
      '<span class="lab">' + n.name + '</span>';
    el.addEventListener('click', () => { stopPlay(); stepTo(i); });
    orbit.appendChild(el);
    nodeEls.push(el);
  }

  /* ═══════════════════════════════
     BUILD DECK DOTS (for ↑/↓ deck nav)
     ═══════════════════════════════ */
  const slides = [...document.querySelectorAll('.slide')];
  const TOTAL = slides.length;
  for (let i = 0; i < TOTAL; i++){
    const d = document.createElement('button');
    d.className = 'slide-dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(d);
  }

  /* ═══════════════════════════════
     ORBIT GEOMETRY & RENDER
     Active node sits at θ = 90° (front-bottom).
     Other nodes lay out clockwise around the ellipse.
     ═══════════════════════════════ */
  const RX_PCT = 45;   // horizontal radius, % of container width
  const RY_PCT = 38;   // vertical radius, % of container height

  function place(){
    nodeEls.forEach((el, i) => {
      const theta = (90 - (i - step) * 60) * Math.PI / 180;
      const x = 50 + RX_PCT * Math.cos(theta);
      const y = 50 + RY_PCT * Math.sin(theta);
      const depth = (Math.sin(theta) + 1) / 2;       // 0 = back, 1 = front
      const scale = 0.62 + depth * 0.55;             // 0.62 .. 1.17
      const opacity = 0.4 + depth * 0.6;             // 0.4 .. 1.0
      const z = Math.round(depth * 100);
      const isActive = i === step;

      el.style.left = x + '%';
      el.style.top = y + '%';
      el.style.opacity = isActive ? 1 : opacity;
      el.style.setProperty('--s', isActive ? 1.18 : scale.toFixed(3));
      el.style.zIndex = isActive ? 200 : z;
      el.classList.toggle('is-active', isActive);
    });
  }

  function renderDetail(){
    const n = NODES[step];
    // Swap the visual via outerHTML on the inner SVG so CSS animations replay
    stageVisual.innerHTML = VIZ[VIZ_KEYS[step]] || '';
    detailName.textContent = n.name;
    detailWhat.textContent = n.what;
    if (stepNumEl) stepNumEl.textContent = step + 1;
  }

  function stepTo(n){
    n = ((n % N) + N) % N;  // wrap both directions
    step = n;
    place();
    renderDetail();
    btnPrev.disabled = false;
    btnNext.disabled = false;
  }

  /* ═══════════════════════════════
     AUTO-PLAY
     ═══════════════════════════════ */
  function togglePlay(){ playing ? stopPlay() : startPlay(); }
  function startPlay(){
    playing = true;
    btnPlay.classList.add('playing');
    btnPlay.innerHTML = '<i class="fas fa-pause"></i>';
    playTimer = setInterval(() => stepTo(step + 1), 2600);
  }
  function stopPlay(){
    playing = false;
    btnPlay.classList.remove('playing');
    btnPlay.innerHTML = '<i class="fas fa-play"></i>';
    if (playTimer){ clearInterval(playTimer); playTimer = null; }
  }

  /* ═══════════════════════════════
     CONTROLS
     ═══════════════════════════════ */
  btnPrev.addEventListener('click', () => { stopPlay(); stepTo(step - 1); });
  btnNext.addEventListener('click', () => { stopPlay(); stepTo(step + 1); });
  btnPlay.addEventListener('click', togglePlay);

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' '){
      e.preventDefault(); stopPlay(); stepTo(step + 1);
    } else if (e.key === 'ArrowLeft'){
      e.preventDefault(); stopPlay(); stepTo(step - 1);
    } else if (e.key === 'ArrowDown'){
      e.preventDefault();
      window.parent.postMessage({type:'deck-nav',dir:'next'},'*');
    } else if (e.key === 'ArrowUp'){
      e.preventDefault();
      window.parent.postMessage({type:'deck-nav',dir:'prev'},'*');
    }
  });

  /* ═══════════════════════════════
     PRESENTER / iframe commands
     ═══════════════════════════════ */
  window.addEventListener('message', e => {
    if (e.data && e.data.type === 'deck-command'){
      if (e.data.action === 'go-first'){ stopPlay(); stepTo(0); }
      else if (e.data.action === 'go-last'){ stopPlay(); stepTo(N - 1); }
      else if (e.data.action === 'set-theme'){
        document.documentElement.setAttribute('data-theme', e.data.theme);
      }
    }
  });

  // Initial paint
  stepTo(0);
  window.parent.postMessage({type:'deck-ready', total: TOTAL}, '*');

})();
</script>
</body>
</html>
