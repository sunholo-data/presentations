<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark Edmondson — Cornwall to Copenhagen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0f0f1a;--surface:#1a1a2e;--surface-hi:#222240;
  --orange:#e73c17;--orange-dim:rgba(231,60,23,.35);--orange-glow:rgba(231,60,23,.6);
  --teal:#1da69a;--teal-dim:rgba(29,166,154,.25);
  --ghost:rgba(255,255,255,.12);
  --text:#e2e8f0;--text-dim:#718096;
  --bar-bg:rgba(15,15,26,.8);--bar-border:rgba(255,255,255,.06);
  --mono:'JetBrains Mono',monospace;--sans:'Montserrat',sans-serif;
}
[data-theme="light"]{
  --bg:#f5f5f0;--surface:#ffffff;--surface-hi:#f0f0ea;
  --orange:#d4300f;--orange-dim:rgba(212,48,15,.2);--orange-glow:rgba(212,48,15,.4);
  --teal:#168077;--teal-dim:rgba(22,128,119,.18);
  --ghost:rgba(0,0,0,.1);
  --text:#1a202c;--text-dim:#4a5568;
  --bar-bg:rgba(255,255,255,.85);--bar-border:rgba(0,0,0,.08);
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans)}
body{
  background-image:
    radial-gradient(circle at 50% 50%, rgba(231,60,23,.03) 0%, transparent 70%),
    linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
  background-size:100% 100%, 60px 60px, 60px 60px;
}
[data-theme="light"] body{
  background-image:
    radial-gradient(circle at 50% 50%, rgba(212,48,15,.03) 0%, transparent 70%),
    linear-gradient(rgba(0,0,0,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,.04) 1px, transparent 1px);
  background-size:100% 100%, 60px 60px, 60px 60px;
}

#app{display:flex;flex-direction:column;height:100vh}
/* ─── Slide canvas: 16:9 letterbox stage ─── */
.slides-viewport{
  flex:1; min-height:0;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; background:var(--bg);
  container-type:size;
}
.slides-stage{
  position:relative;
  width:  min(100cqi, 100cqb * 16 / 9);
  height: min(100cqb, 100cqi * 9 / 16);
  container-type:size;
}
/* Hide own bars when embedded in presenter — presenter supplies global chrome */
.in-iframe .top-bar{display:none}
.in-iframe .bottom-bar{display:none}

.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px 32px;gap:10px;
  opacity:0;visibility:hidden;
  transform:translateX(40px);
  transition:opacity .45s ease, transform .45s ease, visibility .45s;
  overflow:hidden;
}
.slide.active{opacity:1;visibility:visible;transform:translateX(0)}
.slide.exit-left{transform:translateX(-40px);opacity:0}

/* ─── Reveal mechanism ─── */
[data-reveal]{
  opacity:0;
  transform:translateY(8px) scale(.96);
  transition:opacity .55s ease, transform .65s cubic-bezier(.2,.9,.3,1.4);
  pointer-events:none;
}
.slide[data-current-step="1"] [data-reveal="1"],
.slide[data-current-step="2"] [data-reveal="1"],
.slide[data-current-step="2"] [data-reveal="2"],
.slide[data-current-step="3"] [data-reveal="1"],
.slide[data-current-step="3"] [data-reveal="2"],
.slide[data-current-step="3"] [data-reveal="3"],
.slide[data-current-step="4"] [data-reveal="1"],
.slide[data-current-step="4"] [data-reveal="2"],
.slide[data-current-step="4"] [data-reveal="3"],
.slide[data-current-step="4"] [data-reveal="4"],
.slide[data-current-step="5"] [data-reveal]{
  opacity:1;transform:translateY(0) scale(1);pointer-events:auto;
}

/* ─── Journey stage ─── */
.intro-stage{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  width:100%;height:100%;max-width:1400px;
  justify-content:center;
}
.intro-header{
  position:absolute;top:18px;left:32px;
  display:flex;align-items:center;gap:14px;
  z-index:5;
}
.intro-portrait{
  width:64px;height:64px;border-radius:50%;
  object-fit:cover;object-position:center top;
  filter:grayscale(1) contrast(1.08) brightness(1.02);
  border:2px solid var(--orange);
  padding:2px;background:var(--bg);
  box-shadow:0 0 0 1px var(--orange-dim), 0 6px 18px rgba(231,60,23,.18);
  flex-shrink:0;
}
[data-theme="light"] .intro-portrait{
  filter:grayscale(1) contrast(1.05);
}
.intro-text{display:flex;flex-direction:column;gap:4px;align-items:flex-start}
.intro-name{
  font-family:var(--sans);font-size:clamp(20px,2.4cqi,30px);
  font-weight:800;letter-spacing:-.02em;line-height:1;
}
.intro-name .accent{color:var(--orange)}
.intro-role{
  font-family:var(--mono);font-size:10px;font-weight:500;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--text-dim);
}

.journey-map{
  width:auto;max-width:100%;
  height:100%;max-height:92cqb;  /* relative to .slides-stage */
  filter:drop-shadow(0 8px 32px rgba(231,60,23,.08));
}
.journey-map .map-raster{
  filter:grayscale(1) invert(.92) hue-rotate(180deg) blur(0.7px) contrast(.75) brightness(1.05);
  opacity:.42;
}
[data-theme="light"] .journey-map .map-raster{
  filter:grayscale(1) blur(0.7px) contrast(.85) brightness(1.02);
  opacity:.55;
}
.journey-map .map-frame{fill:none;stroke:var(--ghost);stroke-width:1}
.journey-map .arc{
  fill:none;stroke:var(--text-dim);stroke-width:1.5;
  stroke-dasharray:4 6;opacity:.5;
}

.journey-map .arc-cornwall-london{
  stroke-dasharray:140;stroke-dashoffset:140;
  transition:stroke-dashoffset .9s ease, stroke .4s, opacity .4s;
  stroke:var(--text-dim);opacity:.5;
}
.journey-map .arc-london-cph{
  stroke-dasharray:380;stroke-dashoffset:380;
  transition:stroke-dashoffset 1.1s ease .15s, stroke .4s, opacity .4s;
  stroke:var(--text-dim);opacity:.5;
}
.slide[data-current-step="2"] .arc-cornwall-london,
.slide[data-current-step="3"] .arc-cornwall-london,
.slide[data-current-step="4"] .arc-cornwall-london,
.slide[data-current-step="5"] .arc-cornwall-london{
  stroke-dashoffset:0;stroke:var(--orange);opacity:1;
  filter:drop-shadow(0 0 6px var(--orange-glow));
}
.slide[data-current-step="3"] .arc-london-cph,
.slide[data-current-step="4"] .arc-london-cph,
.slide[data-current-step="5"] .arc-london-cph{
  stroke-dashoffset:0;stroke:var(--orange);opacity:1;
  filter:drop-shadow(0 0 6px var(--orange-glow));
}

.journey-map .pin circle{
  fill:var(--orange);stroke:var(--bg);stroke-width:3;
  filter:drop-shadow(0 0 14px var(--orange-glow));
}
.journey-map .pin .pin-bg{
  fill:var(--bg);fill-opacity:.92;
  stroke:var(--orange);stroke-width:1;stroke-opacity:.45;
}
.journey-map .pin .pin-label{
  font-family:var(--mono);font-size:16px;font-weight:800;
  fill:var(--text);letter-spacing:.1em;text-transform:uppercase;
}
.journey-map .pin .pin-sub{
  font-family:var(--mono);font-size:11px;font-weight:600;
  fill:var(--text-dim);letter-spacing:.06em;
}
.journey-map .pin .pin-rule{stroke:var(--orange);stroke-width:1.5;opacity:.9}
.journey-map .pin .pin-connector{
  stroke:var(--orange);stroke-width:1;stroke-dasharray:2 3;opacity:.5;fill:none;
}
.journey-map .era-track-caption{
  font-family:var(--mono);font-size:11px;font-weight:600;
  fill:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;
}

/* Career era track */
.journey-map .era-line{stroke:var(--ghost);stroke-width:1}
.journey-map .era circle{stroke:var(--bg);stroke-width:2}
.journey-map .era-seo   circle{fill:#1da69a}
.journey-map .era-an    circle{fill:#4f9d8f}
.journey-map .era-ds    circle{fill:#8a7152}
.journey-map .era-cloud circle{fill:#c25527}
.journey-map .era-ai    circle{fill:#e73c17;filter:drop-shadow(0 0 8px var(--orange-glow))}
.journey-map .era text{
  font-family:var(--mono);font-size:10px;font-weight:700;
  fill:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;
  text-anchor:middle;
}

.journey-map .career-track{opacity:0;transition:opacity .3s}
.slide[data-current-step="4"] .career-track,
.slide[data-current-step="5"] .career-track{opacity:1}
.journey-map .career-track .era{
  opacity:0;transform:translateY(6px);
  transition:opacity .35s ease, transform .45s cubic-bezier(.2,.9,.3,1.4);
}
.slide[data-current-step="4"] .career-track .era,
.slide[data-current-step="5"] .career-track .era{
  opacity:1;transform:translateY(0);
}
.journey-map .career-track .era:nth-of-type(1){transition-delay:.05s}
.journey-map .career-track .era:nth-of-type(2){transition-delay:.20s}
.journey-map .career-track .era:nth-of-type(3){transition-delay:.35s}
.journey-map .career-track .era:nth-of-type(4){transition-delay:.50s}
.journey-map .career-track .era:nth-of-type(5){transition-delay:.65s}

/* Popup cards */
.journey-map .popup .popup-bg{
  fill:var(--surface);fill-opacity:.96;
  stroke:var(--orange);stroke-width:1;stroke-opacity:.55;
}
.journey-map .popup .popup-connector{
  stroke:var(--orange);stroke-width:1;stroke-dasharray:2 3;opacity:.55;fill:none;
}
.journey-map .popup{
  opacity:0;transform:translateY(8px);
  transition:opacity .45s ease, transform .55s cubic-bezier(.2,.9,.3,1.4);
}
.slide[data-current-step="5"] .popup{opacity:1;transform:translateY(0)}
.journey-map .popup-book {transition-delay:.05s}
.journey-map .popup-gar  {transition-delay:.12s}
.journey-map .popup-gde  {transition-delay:.18s}
.journey-map .popup-ai   {transition-delay:.31s}

/* ─── Bottom bar ─── */
.bottom-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 20px;
  border-top:1px solid var(--bar-border);
  flex-shrink:0;background:var(--bar-bg);backdrop-filter:blur(8px);
}
.transport{display:flex;align-items:center;gap:8px}
.transport-btn{
  width:28px;height:28px;border-radius:50%;
  border:1px solid var(--ghost);background:transparent;
  color:var(--text-dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;transition:all .2s;
}
.transport-btn:hover:not(:disabled){border-color:var(--orange);color:var(--orange)}
.transport-btn:disabled{opacity:.3;cursor:default}
.step-indicator{font-family:var(--mono);font-size:12px;color:var(--text-dim)}
.step-indicator .current{color:var(--text);font-weight:700}
.nav-hints{display:flex;align-items:center;gap:6px}
.kbd{
  display:inline-block;padding:1px 5px;border-radius:3px;
  font-family:var(--mono);font-size:9px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:var(--text-dim);
}
[data-theme="light"] .kbd{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1)}

@media(max-width:900px){.slide{padding:24px}}
</style>
</head>
<body>
<script>if(window!==window.top)document.body.classList.add('in-iframe');</script>
<div id="app">

  <div class="slides-viewport">
    <div class="slides-stage">

    <section class="slide active" data-slide="1" data-steps="5">
      <div class="intro-stage">
        <div class="intro-header">
          <img class="intro-portrait" src="images/me_headshot.jpg" alt="Mark Edmondson">
          <div class="intro-text">
            <h1 class="intro-name">Mark <span class="accent">Edmondson</span></h1>
            <p class="intro-role">Forward Deployed Engineer &middot; founder, Sunholo &middot; Copenhagen</p>
          </div>
        </div>

        <svg class="journey-map" viewBox="0 0 1200 820" preserveAspectRatio="xMidYMid meet">
          <!-- Real NW Europe map raster (Wikimedia Maps · OSM data, ODbL) -->
          <image class="map-raster" href="images/map-nweurope.png"
                 x="0" y="0" width="1200" height="540" preserveAspectRatio="xMidYMid slice"/>
          <rect class="map-frame" x="0" y="0" width="1200" height="540"/>

          <!-- Arc paths (drawn via dashoffset on reveal) -->
          <path class="arc arc-cornwall-london" d="M 400 431 Q 450 430 488 400"/>
          <path class="arc arc-london-cph"      d="M 488 400 Q 630 285 767 251"/>

          <!-- Cornwall pin -->
          <g class="pin pin-cornwall" data-reveal="1">
            <path class="pin-connector" d="M 333 482 L 397 437"/>
            <rect class="pin-bg" x="258" y="482" width="148" height="52" rx="6"/>
            <line class="pin-rule" x1="270" y1="498" x2="394" y2="498"/>
            <text class="pin-label" x="270" y="515">Cornwall</text>
            <text class="pin-sub"   x="270" y="530">guitar in a band</text>
            <circle cx="400" cy="431" r="8"/>
          </g>

          <!-- London pin -->
          <g class="pin pin-london" data-reveal="2">
            <path class="pin-connector" d="M 555 478 L 494 406"/>
            <rect class="pin-bg" x="550" y="475" width="262" height="52" rx="6"/>
            <line class="pin-rule" x1="562" y1="491" x2="800" y2="491"/>
            <text class="pin-label" x="562" y="508">London</text>
            <text class="pin-sub"   x="562" y="523">King's College &middot; Physics &middot; 1998</text>
            <circle cx="488" cy="400" r="7"/>
          </g>

          <!-- Copenhagen pin -->
          <g class="pin pin-cph" data-reveal="3">
            <path class="pin-connector" d="M 793 275 L 773 258"/>
            <rect class="pin-bg" x="788" y="270" width="222" height="52" rx="6"/>
            <line class="pin-rule" x1="800" y1="286" x2="998" y2="286"/>
            <text class="pin-label" x="800" y="303">Copenhagen</text>
            <text class="pin-sub"   x="800" y="318">arrived 2010 &middot; Holosun ApS</text>
            <circle cx="767" cy="251" r="9"/>
          </g>

          <!-- Popup cards (revealed at step 5) -->
          <g class="popup popup-book">
            <path class="popup-connector" d="M 370 710 L 370 760"/>
            <rect class="popup-bg" x="285" y="560" width="170" height="150" rx="8"/>
            <image href="images/lga-cover.jpg" x="321" y="570" width="98" height="130" preserveAspectRatio="xMidYMid meet"/>
          </g>

          <g class="popup popup-gar">
            <path class="popup-connector" d="M 560 710 L 560 760"/>
            <rect class="popup-bg" x="475" y="560" width="170" height="150" rx="8"/>
            <image href="images/gar-hex.png" x="495" y="570" width="130" height="130" preserveAspectRatio="xMidYMid meet"/>
          </g>

          <g class="popup popup-gde">
            <path class="popup-connector" d="M 750 710 L 750 760"/>
            <rect class="popup-bg" x="665" y="560" width="170" height="150" rx="8"/>
            <image href="images/gde-logo.webp" x="685" y="570" width="130" height="130" preserveAspectRatio="xMidYMid meet"/>
          </g>

          <g class="popup popup-ai">
            <path class="popup-connector" d="M 940 710 L 940 760"/>
            <rect class="popup-bg" x="855" y="560" width="170" height="150" rx="8"/>
            <image href="../images/logos/sunholo-logo.svg" x="860" y="585" width="80" height="80" preserveAspectRatio="xMidYMid meet"/>
            <image href="../images/logos/ailang-logo.svg"  x="940" y="585" width="80" height="80" preserveAspectRatio="xMidYMid meet"/>
          </g>

          <!-- Career era track in the strip below the map -->
          <line class="era-line" x1="80" y1="760" x2="1140" y2="760" data-reveal="4"/>
          <text class="era-track-caption" x="80" y="738" data-reveal="4">The same journey, one layer up each time</text>
          <g class="career-track">
            <g class="era era-seo" data-reveal="4">
              <circle cx="180" cy="760" r="10"/>
              <text x="180" y="790">SEO</text>
            </g>
            <g class="era era-an" data-reveal="4">
              <circle cx="370" cy="760" r="10"/>
              <text x="370" y="790">Analytics</text>
            </g>
            <g class="era era-ds" data-reveal="4">
              <circle cx="560" cy="760" r="10"/>
              <text x="560" y="790">Data Science</text>
            </g>
            <g class="era era-cloud" data-reveal="4">
              <circle cx="750" cy="760" r="10"/>
              <text x="750" y="790">Cloud</text>
            </g>
            <g class="era era-ai" data-reveal="4">
              <circle cx="940" cy="760" r="13"/>
              <text x="940" y="792">AI</text>
            </g>
          </g>
        </svg>
      </div>
    </section>

    </div><!-- /slides-stage -->
  </div><!-- /slides-viewport -->

  <div class="bottom-bar">
    <div class="transport">
      <button class="transport-btn" id="btnPrev" title="Previous step"><i class="fas fa-chevron-left"></i></button>
      <span class="step-indicator">step <span class="current" id="stepNum">0</span> / <span id="stepTotal">5</span></span>
      <button class="transport-btn" id="btnNext" title="Next step"><i class="fas fa-chevron-right"></i></button>
    </div>
    <div class="nav-hints">
      <span class="kbd">&larr;</span><span class="kbd">&rarr;</span>
      <span style="font-size:11px;color:var(--text-dim);margin-left:4px">walk timeline</span>
    </div>
  </div>

</div><!-- /app -->

<script>
(function(){
  const slides = document.querySelectorAll('.slide');
  const TOTAL = slides.length;
  let current = 0;
  let transitioning = false;

  const stepNum = document.getElementById('stepNum');
  const stepTotal = document.getElementById('stepTotal');
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');

  function resetSteps(slide){
    slide.dataset.currentStep = 0;
    slide.style.setProperty('--current-step', 0);
    stepNum.textContent = 0;
  }

  function updateStepIndicator(slide){
    stepNum.textContent = slide.dataset.currentStep || 0;
    stepTotal.textContent = slide.dataset.steps || 0;
  }

  function goTo(n){
    if(n<0||n>=TOTAL||n===current||transitioning) return;
    transitioning = true;
    const dir = n > current ? 1 : -1;

    if(current>=0 && current<TOTAL) resetSteps(slides[current]);

    slides.forEach(s=>s.classList.remove('active','exit-left'));
    if(current>=0 && current<TOTAL && dir>0) slides[current].classList.add('exit-left');
    slides[n].classList.add('active');
    resetSteps(slides[n]);
    updateStepIndicator(slides[n]);

    current = n;
    setTimeout(()=>{ transitioning = false; }, 500);
  }

  function handleNext(){
    const slide = slides[current];
    const totalSteps = +slide.dataset.steps || 0;
    let step = +slide.dataset.currentStep || 0;
    if(step < totalSteps){
      const next = step + 1;
      slide.dataset.currentStep = next;
      slide.style.setProperty('--current-step', next);
      updateStepIndicator(slide);
      return;
    }
    goTo(current + 1);
  }

  function handlePrev(){
    const slide = slides[current];
    let step = +slide.dataset.currentStep || 0;
    if(step > 0){
      const prev = step - 1;
      slide.dataset.currentStep = prev;
      slide.style.setProperty('--current-step', prev);
      updateStepIndicator(slide);
      return;
    }
    goTo(current - 1);
  }

  if(slides[0]){ resetSteps(slides[0]); updateStepIndicator(slides[0]); }

  document.addEventListener('keydown', e=>{
    if(e.key==='ArrowRight'||e.key===' ') handleNext();
    if(e.key==='ArrowLeft') handlePrev();
    if(e.key==='ArrowDown'){ e.preventDefault(); window.parent.postMessage({type:'deck-nav',dir:'next'},'*'); }
    if(e.key==='ArrowUp'){ e.preventDefault(); window.parent.postMessage({type:'deck-nav',dir:'prev'},'*'); }
  });
  btnPrev.addEventListener('click', ()=> handlePrev());
  btnNext.addEventListener('click', ()=> handleNext());

  window.addEventListener('message', e=>{
    if(e.data && e.data.type==='deck-command'){
      if(e.data.action==='go-first') goTo(0);
      if(e.data.action==='go-last'){
        const slide = slides[TOTAL-1];
        current = TOTAL-1;
        slides.forEach(s=>s.classList.remove('active','exit-left'));
        slide.classList.add('active');
        const totalSteps = +slide.dataset.steps || 0;
        slide.dataset.currentStep = totalSteps;
        slide.style.setProperty('--current-step', totalSteps);
        updateStepIndicator(slide);
      }
      if(e.data.action==='set-theme') setTheme(e.data.theme);
    }
  });

  window.parent.postMessage({type:'deck-ready',total:TOTAL},'*');

  function setTheme(theme){
    document.documentElement.setAttribute('data-theme', theme);
  }
})();
</script>
</body>
</html>
